site_name: "電験３種 法規Wiki"
site_description: "電験３種 法規 — 条文×過去問クロスリファレンス"
site_url: "https://kfurufuru.github.io/denken-wiki/"
site_author: "Furutachi"
repo_url: "https://github.com/kfurufuru/denken-wiki"
repo_name: "denken-wiki"
copyright: "&copy; 2026 Furutachi — 個人学習用"

theme:
  name: material
  custom_dir: overrides
  language: ja
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.tooltips
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: ja
  - macros:
      module_name: main
      include_yaml:
        - _data/kakomon.yml

exclude_docs: |
  _data/

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.critic
  - pymdownx.mark
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - abbr
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md

extra_css:
  - stylesheets/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kfurufuru/denken-wiki
      name: GitHub リポジトリ

